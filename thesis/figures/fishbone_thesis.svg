<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <title>Research milestone structure (fishbone)</title>
  <desc>Milestone fishbone: M1 complete, M2 in progress, M3 to M9 planned, converging on M8 field validation.</desc>
  <style>
    text { font-family: "Liberation Serif", "Times New Roman", serif; fill: #000000; }
    .code { font-size: 13.5px; font-weight: bold; }
    .lab  { font-size: 13px; }
    .leg  { font-size: 12px; }
  </style>

  <!-- tail -->
  <line x1="20" y1="175" x2="45" y2="200" stroke="#000" stroke-width="2"/>
  <line x1="20" y1="225" x2="45" y2="200" stroke="#000" stroke-width="2"/>
  <!-- spine -->
  <line x1="45" y1="200" x2="630" y2="200" stroke="#000" stroke-width="2"/>

  <!-- M1: complete = heavy solid -->
  <line x1="150" y1="200" x2="85" y2="102" stroke="#000" stroke-width="2.6"/>
  <text class="code" x="85" y="64" text-anchor="middle">M1 — 2-DOF model</text>
  <text class="lab"  x="85" y="82" text-anchor="middle">validation (complete)</text>

  <!-- M3 planned = light -->
  <line x1="285" y1="200" x2="220" y2="102" stroke="#000" stroke-width="1.1"/>
  <text class="code" x="220" y="64" text-anchor="middle">M3 — momentum</text>
  <text class="lab"  x="220" y="82" text-anchor="middle">observer</text>

  <!-- M5 planned -->
  <line x1="420" y1="200" x2="355" y2="102" stroke="#000" stroke-width="1.1"/>
  <text class="code" x="355" y="64" text-anchor="middle">M5 — motor-current</text>
  <text class="lab"  x="355" y="82" text-anchor="middle">torque mapping</text>

  <!-- M7 planned -->
  <line x1="555" y1="200" x2="490" y2="102" stroke="#000" stroke-width="1.1"/>
  <text class="code" x="490" y="64" text-anchor="middle">M7 — digging-force</text>
  <text class="lab"  x="490" y="82" text-anchor="middle">model</text>

  <!-- M2: in progress = heavy dashed -->
  <line x1="217" y1="200" x2="152" y2="298" stroke="#000" stroke-width="2.6" stroke-dasharray="8 4"/>
  <text class="code" x="152" y="322" text-anchor="middle">M2 — load-torque</text>
  <text class="lab"  x="152" y="340" text-anchor="middle">recovery (in progress)</text>

  <!-- M4 planned -->
  <line x1="352" y1="200" x2="287" y2="298" stroke="#000" stroke-width="1.1"/>
  <text class="code" x="287" y="322" text-anchor="middle">M4 — measurement-</text>
  <text class="lab"  x="287" y="340" text-anchor="middle">noise robustness</text>

  <!-- M6 planned -->
  <line x1="487" y1="200" x2="422" y2="298" stroke="#000" stroke-width="1.1"/>
  <text class="code" x="422" y="322" text-anchor="middle">M6 — 4-DOF</text>
  <text class="lab"  x="422" y="340" text-anchor="middle">extension</text>

  <!-- M9 planned -->
  <line x1="605" y1="200" x2="540" y2="298" stroke="#000" stroke-width="1.1"/>
  <text class="code" x="540" y="322" text-anchor="middle">M9 — physics-informed</text>
  <text class="lab"  x="540" y="340" text-anchor="middle">learning layer</text>

  <!-- head: M8 -->
  <polygon points="630,153 730,175 760,200 730,225 630,247" fill="#E8E8E8" stroke="#000" stroke-width="1.4"/>
  <text class="code" x="692" y="190" text-anchor="middle">M8 — field</text>
  <text class="code" x="692" y="206" text-anchor="middle">validation</text>
  <text class="lab"  x="692" y="224" text-anchor="middle">(CMPDI data)</text>

  <!-- grayscale-safe legend -->
  <line x1="150" y1="376" x2="190" y2="376" stroke="#000" stroke-width="2.6"/>
  <text class="leg" x="196" y="380">complete</text>
  <line x1="290" y1="376" x2="330" y2="376" stroke="#000" stroke-width="2.6" stroke-dasharray="8 4"/>
  <text class="leg" x="336" y="380">in progress</text>
  <line x1="445" y1="376" x2="485" y2="376" stroke="#000" stroke-width="1.1"/>
  <text class="leg" x="491" y="380">planned</text>
</svg>
